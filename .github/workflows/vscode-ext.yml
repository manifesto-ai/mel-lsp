name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "bin/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsup.config.ts"
      - "vscode-mel/**"
      - ".github/workflows/vscode-ext.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-mel
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        working-directory: .
      - run: npm install
      - run: npm run compile
      - run: npm run prepare:server
      - run: npm run stage:vsix
      - run: npm install --omit=dev
        working-directory: vscode-mel/.vsce-stage
      - run: npx @vscode/vsce package
        working-directory: vscode-mel/.vsce-stage
      - run: unzip -l ./*.vsix | grep "extension/server/server.js"
        working-directory: vscode-mel/.vsce-stage
      - run: unzip -l ./*.vsix | grep "node_modules/vscode-languageclient"
        working-directory: vscode-mel/.vsce-stage
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-mel.vsix
          path: vscode-mel/.vsce-stage/*.vsix

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: vscode-mel
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        working-directory: .
      - run: npm install
      - run: npm run compile
      - run: npm run prepare:server
      - run: npm run stage:vsix
      - run: npm install --omit=dev
        working-directory: vscode-mel/.vsce-stage
      - run: npx @vscode/vsce publish
        working-directory: vscode-mel/.vsce-stage
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
